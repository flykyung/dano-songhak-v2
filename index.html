<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base target="_top">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1 class="app-title">🎋 단오 경제 축제 Pay</h1>
  <p class="app-subtitle" id="headerSubtitle">거래 유형을 선택해 주세요</p>
</header>

<div class="main-container">

  <div id="menuScreen" class="screen active">
    <div class="section-card menu-card">
      <p class="menu-heading">오늘 어떤 부스를 운영하시나요?</p>

      <button type="button" class="btn-mode btn-mode-earn" data-mode="earn">
        <span class="btn-mode-icon">💰</span>
        <span class="btn-mode-text">단오 적립<small>퀴즈를 풀면 단오가 적립돼요</small></span>
      </button>

      <button type="button" class="btn-mode btn-mode-spend" data-mode="spend">
        <span class="btn-mode-icon">🛍️</span>
        <span class="btn-mode-text">단오 마켓<small>창포비누 만들기와 음식 체험</small></span>
      </button>

      <button type="button" class="btn-mode btn-mode-check" data-mode="check">
        <span class="btn-mode-icon">🔍</span>
        <span class="btn-mode-text">내 잔액 확인하기<small>QR 스캔 후 현재 잔액 조회</small></span>
      </button>
    </div>
  </div>

  <div id="sessionScreen" class="screen">

    <div id="modeBanner" class="mode-banner earn">
      <i class="bi bi-info-circle-fill"></i>
      <span id="modeBannerText">-</span>
    </div>

    <div id="boothPickWrap" class="booth-pick-wrap section-card p-3" style="display:none;">
      <div class="booth-pick-label">체험을 선택하세요</div>
      <div class="booth-pill" data-booth="soap">🧼 창포비누만들기</div>
      <div class="booth-pill" data-booth="food">🍡 음식 체험</div>
      <div class="booth-pill" data-booth="market">🛒 작은마켓</div>
    </div>

    <div id="scannerSection" class="section-card scanner-wrap" style="display:none;">
      <div class="scanner-label"><i class="bi bi-qr-code-scan"></i> 학생 QR 스캔</div>
      <div id="qr-reader"></div>
      <p class="scan-hint">학생 QR 코드(학번_이름)를 카메라에 비춰 주세요</p>
    </div>

    <div id="studentCard" class="section-card" style="display:none;">
      <div class="card-body p-3">
        <div class="d-flex align-items-center justify-content-between">
          <div>
            <div class="text-muted small mb-1">학생 정보</div>
            <div class="student-info-line" id="studentInfoLine">-</div>
          </div>
          <div class="text-end">
            <div class="text-muted small">현재 잔액</div>
            <div class="balance-badge">
              <i class="bi bi-coin"></i><span id="studentBalance">0</span><span class="unit">단오</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="checkBalanceCard" class="section-card mt-3" style="display:none;">
      <div class="check-balance-wrap">
        <div class="check-amount">
          <i class="bi bi-coin"></i>
          <span id="checkAmount">0</span>
        </div>
        <div class="check-unit">단오</div>
      </div>
    </div>

    <div id="txForm" class="section-card mt-3" style="display:none;">
      <div class="card-body p-3">
        <span id="txTypeBadge" class="tx-type-badge earn">적립</span>
        <div class="text-muted small mb-2" id="txBoothLabel"></div>

        <div id="duplicateWarning" class="duplicate-warning" style="display:none;">
          <i class="bi bi-exclamation-circle-fill"></i> 이미 참여한 활동입니다
        </div>

        <div id="fixedAmountWrap" style="display:none;">
          <div class="form-label"><i class="bi bi-coin"></i> 차감 금액</div>
          <div class="fixed-amount-display"><i class="bi bi-coin"></i> 1 단오</div>
        </div>

        <div id="marketAmountWrap" style="display:none;">
          <div class="form-label"><i class="bi bi-coin"></i> 차감 금액</div>
          <div class="fixed-amount-display"><i class="bi bi-coin"></i> 1 단오</div>
        </div>

        <div id="foodSelectWrap" style="display:none;" class="mb-3">
          <label for="foodSelect" class="form-label"><i class="bi bi-coin"></i> 메뉴 선택</label>
          <select class="form-select form-select-lg" id="foodSelect">
            <option value="" selected disabled>메뉴를 선택하세요</option>
            <option value="rice"  data-amount="2" data-key="rice">수리취떡 (2단오)</option>
            <option value="punch" data-amount="2" data-key="punch">앵두화채 (2단오)</option>
            <option value="drink" data-amount="2" data-key="drink">건강음료 (2단오)</option>
          </select>
        </div>

        <div id="amountWrap" class="mb-3" style="display:none;">
          <label for="amountInput" class="form-label"><i class="bi bi-coin"></i> 금액 (단오)</label>
          <input type="number" class="form-control form-control-lg" id="amountInput"
                 placeholder="예: 3" min="1" inputmode="numeric">
        </div>

        <div class="mb-3" id="pinWrap">
          <label for="pinInput" class="form-label">관리자 PIN</label>
          <input type="password" class="form-control" id="pinInput"
                 placeholder="PIN 번호 입력" maxlength="8" inputmode="numeric" autocomplete="off">
        </div>

        <button type="button" class="btn btn-execute w-100 mb-2" id="btnExecute" disabled>
          <i class="bi bi-check-circle"></i> 실행
        </button>
        <button type="button" class="btn btn-outline-secondary btn-rescan w-100" id="btnRescan">
          <i class="bi bi-qr-code-scan"></i> 다른 학생 스캔
        </button>
      </div>
    </div>

    <div id="checkButtons" class="mt-3" style="display:none;">
      <button type="button" class="btn btn-outline-secondary btn-rescan w-100 mb-2" id="btnCheckRescan">
        <i class="bi bi-qr-code-scan"></i> 다른 학생 스캔
      </button>
    </div>

    <button type="button" class="btn btn-outline-secondary btn-back-menu w-100 mt-3" id="btnBackMenu">
      <i class="bi bi-house"></i> 처음으로 (메뉴 선택)
    </button>
  </div>

  <p class="status-bar" id="statusBar">거래 유형을 선택해 주세요</p>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner-border text-light" style="width:3rem;height:3rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center p-4">
        <div class="modal-icon" id="modalIcon"></div>
        <h5 class="modal-title-text mb-2" id="modalTitle">-</h5>
        <p class="text-muted mb-0" id="modalMessage" style="white-space:pre-line;">-</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pb-4 pt-0">
        <button type="button" class="btn btn-execute px-5" data-bs-dismiss="modal">확인</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

</body>
</html>
